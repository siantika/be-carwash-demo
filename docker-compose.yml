services:
  db:
    image: postgres:16
    container_name: carwash-db
    environment:
      POSTGRES_DB: demo_carwash
      POSTGRES_USER: app
      POSTGRES_PASSWORD: apppass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d demo_carwash"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: carwash-api
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
