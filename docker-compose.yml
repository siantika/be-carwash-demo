services:
  db:
    image: postgres:16
    container_name: carwash-db
    environment:
      POSTGRES_DB: demo_carwash
      POSTGRES_USER: app
      POSTGRES_PASSWORD: apppass
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d demo_carwash"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: postgres:16
    container_name: carwash-migrate
    env_file:
      - .env.docker
    volumes:
      - ./docker/init-db.sh:/docker/init-db.sh:ro
      - ./docker/schema.sql:/schema.sql:ro
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "/docker/init-db.sh"]
    restart: "no"

  seed:
    build: .
    container_name: carwash-seed
    env_file:
      - .env.docker
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "app.scripts.seed"]
    restart: "no"

  api:
    build: .
    container_name: carwash-api
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
